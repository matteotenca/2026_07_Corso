<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form</title>
</head>
<body style="font-size: 25px;">

<!-- method dei form: GET o POST -->
<form id="primo_form" action="" method="get" target="_blank">
    <label for="input_nome">Nome</label>
    <br>Inserire tutti i nomi di battesimo<br>
    <input name="campo_nome" id="input_nome" type="text" value="Matteo">
    <br>
    <label for="input_cognome">Cognome</label>
    <br>
    <input name="campo_cognome" id="input_cognome" type="text" value="">
    <input type="button" value="Clicca qui">
    <button id="bottone_semantico" type="button"> Clicca sul button</button>
    <br>
    <input type="reset" value="Cancella form">
    <button type="reset">Spazza via il contenuto</button>
    <br>
    <label for="password_untente">Password</label>
    <input id="password_untente" type="password" value="Inserisci la tua password">
    <br>
    <label for="data_nascita"></label>
    <input id="data_nascita" type="date" name="nascita">
    <br>
    <label for="orario"></label>
    <input id="orario" type="time" >
    <br>
    <label for="numero">Numero</label>
    <input id="numero" min="10" max="20" step="5" type="number">
    <br>
    <label for="intervallo"></label>
    <input id="intervallo" type="range" min="1" max="10" step="1" name="valore_intervallo">
    <br>
    <label for="colore">Colore</label>
    <input id="colore" type="color" name="mio_colore">
    <br>
    <input type="file" value="Scegli un file" name="mio_file"  accept=".html,.jpg">
    <br>
    <br>
    <label for="area">Textarea</label>
    <textarea name="mio_testo" maxlength="5" id="area" cols="30" rows="10"></textarea>
    <br><br>
    <label for="tendina">Tendina</label>
    <select name="mia_tendina" id="tendina">
        <option value="">Seleziona un testo</option>
        <option value="1">Pippo</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
    </select>
    <br>
    <br>

    <input type="submit" value="Invia dati">
</form>

</body>
</html>
